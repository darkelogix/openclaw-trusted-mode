name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: npm run lint-docs-terminology
      - run: npm run verify-release-artifacts
      - run: npm run verify-changelog-version
      - run: npm run verify-plugin-schema-contract
      - run: npm run build
      - run: npm test
      - run: npm run verify-compatibility-matrix
      - run: |
          node scripts/mock_pdp.js &
          sleep 1
          PDP_URL=http://localhost:8001/v1/authorize npm run trusted-mode-check
          PDP_URL=http://localhost:8001/v1/authorize npm run adversarial-check
