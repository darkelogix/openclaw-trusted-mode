name: openclaw-clean-room-smoke

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20.19.0
          cache: npm
      - run: npm ci
      - run: ./scripts/run_clean_room_smoke.ps1 -EnvironmentLabel github-${{ matrix.os }} -OpenClawVersion smoke
      - uses: actions/upload-artifact@v6
        with:
          name: openclaw-clean-room-${{ matrix.os }}
          path: release-evidence/matrix/runs/*.json
